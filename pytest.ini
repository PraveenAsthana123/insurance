[pytest]
# importlib mode lets duplicate-named modules (api/test_api.py in many depts)
# coexist without collection errors per global §75.10 RCA
addopts = --import-mode=importlib
markers =
    eval: opt-in RAG quality evaluation (requires Ollama running)
    requires_postgres: test needs a running postgres on localhost:5432 (auto-skip otherwise)

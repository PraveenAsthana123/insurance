global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: insur

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: prometheus-self
    static_configs:
      - targets: ['localhost:9090']

  # Add your backend service here when it exposes /metrics
  - job_name: insur-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']

  # Add nginx exporter when nginx-lb module is installed
  - job_name: nginx
    metrics_path: /nginx_status
    static_configs:
      - targets: ['nginx:80']

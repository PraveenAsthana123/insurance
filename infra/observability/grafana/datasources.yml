apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: 'loki'
        tags: ['project', 'request_id', 'tenant_id']

  - name: Phoenix
    type: prometheus
    access: proxy
    url: http://phoenix:6006/api/v1
    editable: false

# NGINX load balancer for insur_project — production-grade config.
# Per global §47 (architecture) + §38 (no public unencrypted endpoints).

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────
    # Logging — JSON for structured-log ingestion per global §5
    # ─────────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$request_id",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"x_tenant_id":"$http_x_tenant_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ─────────────────────────────────────────────────────────────────────
    # Performance + safety defaults
    # ─────────────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;          # don't leak nginx version
    client_max_body_size 100M;  # claim documents / damage photos

    # Request body buffering — avoid disk spool for small bodies
    client_body_buffer_size 1m;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ─────────────────────────────────────────────────────────────────────
    # Gzip / Brotli compression
    # ─────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        text/javascript
        image/svg+xml;

    # ─────────────────────────────────────────────────────────────────────
    # Rate limiting — per-tenant per global §41.4
    # ─────────────────────────────────────────────────────────────────────
    limit_req_zone $http_x_tenant_id zone=api_per_tenant:10m rate=100r/s;
    limit_req_zone $http_x_tenant_id zone=ai_per_tenant:10m  rate=20r/m;
    limit_req_zone $binary_remote_addr zone=ip_global:10m    rate=1000r/s;

    # ─────────────────────────────────────────────────────────────────────
    # Upstream backend pool — round-robin with least_conn for fairness
    # ─────────────────────────────────────────────────────────────────────
    upstream backend_pool {
        least_conn;
        # When scaled with docker-compose `--scale backend=4` these resolve.
        server backend:8000 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    upstream frontend_pool {
        # Static asset serving — fewer instances; CDN handles real load.
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ─────────────────────────────────────────────────────────────────────
    # Security headers — per global §4.3
    # ─────────────────────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP intentionally tight — adjust if frontend embeds 3rd-party widgets
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'" always;

    # Generate per-request correlation_id if upstream didn't supply one
    map $http_x_request_id $upstream_request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ─────────────────────────────────────────────────────────────────────
    # HTTPS server (production)
    # ─────────────────────────────────────────────────────────────────────
    # In production: terminate TLS at the LB; certs from Let's Encrypt or AWS ACM.
    # For local docker-compose dev: HTTP only (port 80).
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Tenant ID header is REQUIRED for /api/v1/ — strip + force re-set
        if ($http_x_tenant_id = "") {
            set $missing_tenant 1;
        }

        # ── Health (open, no rate limit) ────────────────────────────────
        location /api/health {
            access_log off;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 5s;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.16.0.0/12;  # docker bridge
            allow 10.0.0.0/8;
            deny all;
        }

        # ── AI inference endpoints — slower, lower rate ─────────────────
        location ~ ^/api/v1/holy/.+/pipelines/.+/run$ {
            limit_req zone=ai_per_tenant burst=5 nodelay;
            limit_req zone=ip_global burst=100;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $upstream_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 900s;   # ML pipelines can be slow
            proxy_send_timeout 900s;
        }

        # ── Standard API endpoints ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_per_tenant burst=50 nodelay;
            limit_req zone=ip_global burst=200;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-ID $upstream_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 5s;

            # Pass through correlation_id (§57.6 canonical field)
            proxy_set_header X-Tenant-ID $http_x_tenant_id;
        }

        # ── Frontend static assets ──────────────────────────────────────
        location / {
            proxy_pass http://frontend_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;

            # Cache static assets aggressively (CDN should sit in front
            # but local cache reduces upstream load when CDN is absent)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                proxy_pass http://frontend_pool;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # Custom error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            return 503 '{"detail":"upstream unavailable","error_code":"UPSTREAM_DOWN","correlation_id":"$upstream_request_id"}';
            default_type application/json;
        }
    }
}

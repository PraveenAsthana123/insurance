name: CI

on:
  push:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check governance doc updates
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: ./scripts/governance_diff_check.sh

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend tests
        run: PYTHONPATH=backend python -m pytest backend/tests -q -m "not eval"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Validate frontend
        run: npm run validate

  ui-policy:
    # §137 — No black background in content/workspace areas.
    # Reference: ~/.claude/policies/no-black-content-background.md
    # Audit uses awk 5-line context to exempt navigation chrome
    # (<aside>, Sidebar, Header, TopBar, channel-list, nav-rail).
    # No untrusted github.event.* input · static deterministic grep.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: '§137 audit · no black backgrounds in content areas'
        run: ./scripts/audit_no_black_backgrounds.sh
